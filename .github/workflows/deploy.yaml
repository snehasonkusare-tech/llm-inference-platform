name: Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: my-llm-platform
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/my-llm-platform/llm-platform
  GKE_CLUSTER: llm-cluster
  GKE_ZONE: us-central1

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Detect which images changed so we only rebuild what's needed
  # -----------------------------------------------------------------------
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      vllm: ${{ steps.filter.outputs.vllm }}
      cpu: ${{ steps.filter.outputs.cpu }}
      router: ${{ steps.filter.outputs.router }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            vllm:
              - 'docker/vllm-server/**'
            cpu:
              - 'docker/cpu-server/**'
            router:
              - 'docker/inference-router/**'
              - 'src/router/**'

  # -----------------------------------------------------------------------
  # Job 2: Build & push changed images to Artifact Registry
  # -----------------------------------------------------------------------
  build:
    name: Build images
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to GCP
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' | base64 -d > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json
          gcloud config set project ${{ env.PROJECT_ID }}
          rm /tmp/sa-key.json

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push vLLM server
        if: needs.changes.outputs.vllm == 'true'
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/vllm-server:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/vllm-server:latest \
            -f docker/vllm-server/Dockerfile .
          docker push ${{ env.REGISTRY }}/vllm-server:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/vllm-server:latest

      - name: Build & push CPU server
        if: needs.changes.outputs.cpu == 'true'
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/cpu-server:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/cpu-server:latest \
            -f docker/cpu-server/Dockerfile .
          docker push ${{ env.REGISTRY }}/cpu-server:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/cpu-server:latest

      - name: Build & push inference router
        if: needs.changes.outputs.router == 'true'
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/inference-router:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/inference-router:latest \
            -f docker/inference-router/Dockerfile .
          docker push ${{ env.REGISTRY }}/inference-router:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/inference-router:latest

  # -----------------------------------------------------------------------
  # Job 3: Deploy to GKE (only on main, after build succeeds)
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: [changes, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to GCP and get GKE credentials
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json
          gcloud config set project ${{ env.PROJECT_ID }}
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GKE_ZONE }} \
            --project ${{ env.PROJECT_ID }}
          rm /tmp/sa-key.json

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/namespaces/
          kubectl apply -f k8s/rbac/
          kubectl apply -f k8s/configmaps/
          kubectl apply -f k8s/services/
          kubectl apply -f k8s/deployments/
          kubectl apply -f k8s/keda/
          kubectl apply -f k8s/gateway/

      - name: Rollout updated deployments
        run: |
          if [ "${{ needs.changes.outputs.vllm }}" == "true" ]; then
            kubectl rollout restart deployment/llama3-8b -n llm-serving || true
            kubectl rollout restart deployment/mistral-7b -n llm-serving || true
          fi
          if [ "${{ needs.changes.outputs.cpu }}" == "true" ]; then
            kubectl rollout restart deployment/gemma-2b-cpu -n llm-serving
          fi
          if [ "${{ needs.changes.outputs.router }}" == "true" ]; then
            kubectl rollout restart deployment/inference-router -n llm-serving
          fi

      - name: Wait for rollouts to complete
        run: |
          kubectl rollout status deployment/inference-router -n llm-serving --timeout=300s
          kubectl rollout status deployment/gemma-2b-cpu -n llm-serving --timeout=600s

      - name: Smoke test
        run: |
          ROUTER_IP=$(kubectl get svc inference-router-svc -n llm-serving \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://$ROUTER_IP:8080/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer sk-dev-key" \
            -d '{"model":"gemma-2b","messages":[{"role":"user","content":"hi"}],"max_tokens":5}')
          if [ "$RESPONSE" != "200" ]; then
            echo "Smoke test failed — HTTP $RESPONSE"
            exit 1
          fi
          echo "Smoke test passed — HTTP $RESPONSE"
