apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-platform-dashboard
  namespace: llm-monitoring
  labels:
    grafana_dashboard: "1"
data:
  llm-platform.json: |
    {
      "title": "LLM Inference Platform",
      "uid": "llm-platform",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(inference_requests_total[2m])) by (model)",
            "legendFormat": "{{ model }}"
          }]
        },
        {
          "id": 2,
          "title": "P95 Latency (seconds)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum(rate(inference_request_duration_seconds_bucket[5m])) by (le, model))",
            "legendFormat": "p95 {{ model }}"
          }]
        },
        {
          "id": 3,
          "title": "Error Rate (%)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(inference_requests_total{status=~\"5..\"}[5m])) / sum(rate(inference_requests_total[5m])) * 100",
            "legendFormat": "error %"
          }]
        },
        {
          "id": 4,
          "title": "Active Requests",
          "type": "stat",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 8 },
          "targets": [{
            "expr": "sum(inference_active_requests)",
            "legendFormat": "active"
          }]
        },
        {
          "id": 5,
          "title": "Pod Restarts (last 1h)",
          "type": "stat",
          "gridPos": { "x": 18, "y": 8, "w": 6, "h": 8 },
          "targets": [{
            "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=\"llm-serving\"}[1h]))",
            "legendFormat": "restarts"
          }]
        },
        {
          "id": 6,
          "title": "CPU Usage by Pod",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"llm-serving\"}[2m])) by (pod)",
            "legendFormat": "{{ pod }}"
          }]
        },
        {
          "id": 7,
          "title": "Memory Usage by Pod",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [{
            "expr": "sum(container_memory_usage_bytes{namespace=\"llm-serving\"}) by (pod)",
            "legendFormat": "{{ pod }}"
          }]
        }
      ]
    }
