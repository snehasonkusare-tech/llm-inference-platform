# Helm values for kube-prometheus-stack
# Install with:
#   helm install prometheus prometheus-community/kube-prometheus-stack \
#     -n llm-monitoring --create-namespace \
#     -f k8s/monitoring/prometheus-values.yaml

prometheus:
  prometheusSpec:
    # Scrape interval
    scrapeInterval: 15s
    evaluationInterval: 15s
    retention: 7d

    # Watch all namespaces for ServiceMonitors
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    serviceMonitorSelector: {}

    podMonitorSelectorNilUsesHelmValues: false
    podMonitorNamespaceSelector: {}
    podMonitorSelector: {}

    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}

    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1"

grafana:
  enabled: true
  adminPassword: "llm-platform-admin"

  service:
    type: LoadBalancer

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # Auto-load our custom dashboard
  dashboardsConfigMaps:
    llm-platform: "llm-platform-dashboard"

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: llm-platform
        orgId: 1
        folder: "LLM Platform"
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards/llm-platform

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"

# Disable components we don't need to save resources
kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

kubelet:
  enabled: true
