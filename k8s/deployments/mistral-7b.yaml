apiVersion: apps/v1
kind: Deployment
metadata:
  name: mistral-7b
  namespace: llm-serving
  labels:
    app: mistral-7b
    model: mistral
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mistral-7b
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: mistral-7b
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: llm-ksa

      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"

      nodeSelector:
        cloud.google.com/gke-accelerator: "nvidia-tesla-t4"

      containers:
      - name: vllm
        image: us-central1-docker.pkg.dev/my-llm-platform/llm-platform/vllm-server:latest
        imagePullPolicy: Always

        envFrom:
        - configMapRef:
            name: vllm-config

        env:
        - name: MODEL_NAME
          value: "mistralai/Mistral-7B-Instruct-v0.3"
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: hf-token
              key: HF_TOKEN

        ports:
        - name: http
          containerPort: 8000

        resources:
          requests:
            nvidia.com/gpu: "1"
            memory: "16Gi"
            cpu: "4"
          limits:
            nvidia.com/gpu: "1"
            memory: "20Gi"
            cpu: "8"

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 180
          periodSeconds: 10
          failureThreshold: 30

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 240
          periodSeconds: 30

        volumeMounts:
        - name: model-cache
          mountPath: /model-weights

      volumes:
      - name: model-cache
        emptyDir:
          sizeLimit: 50Gi
